server {
  listen 80;
  server_name _;
  # Redirect all HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/voltdocs.crt;
  ssl_certificate_key /etc/nginx/ssl/voltdocs.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 100m;

  location /api/ {
    proxy_pass         http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout    600s;
    proxy_connect_timeout  30s;
    proxy_send_timeout    120s;
  }

  # Static assets from Vite build / public folder — serve directly, never fall through to SPA
  location ~* \.(?:ico|png|svg|jpg|jpeg|gif|webp|css|js|woff2?|txt|html)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
