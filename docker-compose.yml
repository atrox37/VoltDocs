services:
  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATA_DIR: /app/data
      PANDOC_PATH: pandoc
    volumes:
      - /opt/voltdocs/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8088:80"
      - "18088:443"
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
