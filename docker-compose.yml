services:
  api:
    build:
      context: ./backend-py
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
      REQUIRE_AUTH: "${REQUIRE_AUTH:-true}"
      PANDOC_PATH: pandoc
      PANDOC_TIMEOUT_SECONDS: "300"
      MAX_UPLOAD_MB: "50"
      TRANSLATION_LAMBDA_URL: "${TRANSLATION_LAMBDA_URL:-}"
      TRANSLATION_BATCH_MAX_BYTES: "${TRANSLATION_BATCH_MAX_BYTES:-5000}"
      TRANSLATION_BATCH_MAX_SEGMENTS: "${TRANSLATION_BATCH_MAX_SEGMENTS:-120}"
      TRANSLATION_TIMEOUT_SECONDS: "90"
      GLOSSARY_MAX_TERMS_PER_REQUEST: "100"
      GLOSSARY_MAX_PROMPT_CHARS: "12000"
      BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-5-20250929-v1:0}"
      BEDROCK_REGION: "${BEDROCK_REGION:-us-east-1}"
      BEDROCK_AWS_PROFILE: "${BEDROCK_AWS_PROFILE:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      INITIAL_ADMIN_EMAIL: "${INITIAL_ADMIN_EMAIL:-}"
      COGNITO_DOMAIN: "${COGNITO_DOMAIN:-}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID:-}"
      COGNITO_CLIENT_SECRET: "${COGNITO_CLIENT_SECRET:-}"
      COGNITO_REDIRECT_URI: "${COGNITO_REDIRECT_URI:-}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:8088}"
    volumes:
      - /opt/voltdocs/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - api
    restart: unless-stopped
